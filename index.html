
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Frühstückskasse</title>

  <!-- ✅ Supabase CDN (UMD, genau diese Zeile) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- optional: Favicon‑Fehler vermeiden -->
  <link rel="icon" href="data:,">
</head>
<body>

  <h1>Frühstückskasse</h1>

  <input id="username" placeholder="Dein Name" />
  <br><br>

  <input id="password" type="password" placeholder="Dein Passwort" />
  <br><br>

  <button id="loginBtn">Anmelden / Registrieren</button>

  <p id="status"></p>

  <script>
    // ✅ Supabase korrekt initialisieren (NICHT neu deklarieren!)
    const { createClient } = supabase;

    const client = createClient(
      "https://uvqytdftuyhlohnjbstn.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2cXl0ZGZ0dXlobG9obmpic3RuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5MTM2NDksImV4cCI6MjA5MzQ4OTY0OX0.OJZIcq46WiM1JjpYrqqKg-Q8XdbieS1OYrbGoFqxOcE"
    );

    function normalizeUsername(name) {
      return name
        .trim()
        .toLowerCase()
        .replace(/ä/g,"ae")
        .replace(/ö/g,"oe")
        .replace(/ü/g,"ue")
        .replace(/ß/g,"ss")
        .replace(/\s+/g,"-");
    }

    async function login() {
      const rawName = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      const username = normalizeUsername(rawName);
      const email = `${username}@example.de`;

      document.getElementById("status").innerText = "⏳ Bitte warten…";

      // zuerst Login versuchen
      let { error } = await client.auth.signInWithPassword({
        email,
        password
      });

      // wenn Login fehlschlägt → Signup
      if (error) {
        const res = await client.auth.signUp({
          email,
          password
        });

        if (res.error) {
          document.getElementById("status").innerText =
            "❌ Fehler: " + res.error.message;
          return;
        }
      }

      document.getElementById("status").innerText =
        "✅ Eingeloggt als " + rawName;
    }

    // ✅ Button sauber binden (statt inline onclick)
    document
      .getElementById("loginBtn")
      .addEventListener("click", login);
  </script>

</body>
</html>
